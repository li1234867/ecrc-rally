<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECRC拉力冠军赛</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{background:#111;color:#fff;padding:15px;max-width:480px;margin:0 auto}
    .title{text-align:center;color:#00d4ff;margin:20px 0;font-size:22px}
    .menu{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .btn{background:#00d4ff;color:#000;padding:12px;border-radius:8px;text-align:center;font-weight:bold;cursor:pointer}
    .section{margin-bottom:25px}
    .section-title{color:#00d4ff;margin-bottom:10px;font-size:18px}
    .item{background:#222;padding:10px;margin-bottom:8px;border-radius:6px}
    input,select{width:100%;padding:10px;margin:5px 0;background:#333;color:#fff;border:none;border-radius:6px}
    .tip{color:#ff9100;text-align:center;margin:10px 0;font-size:14px}
  </style>
</head>
<body>
  <h1 class="title">ECRC拉力冠军赛</h1>
  <p class="tip">✅ 云端同步版 · 所有人数据实时统一</p>

  <div class="menu">
    <div class="btn" onclick="go('players')">选手管理</div>
    <div class="btn" onclick="go('matches')">赛事管理</div>
    <div class="btn" onclick="go('scores')">成绩录入</div>
    <div class="btn" onclick="go('rank')">实时排行</div>
  </div>

  <div id="app"></div>

  <script>
    let config, data, page = 'home'
    const raw = 'https://raw.githubusercontent.com/'
    const api = 'https://api.github.com/repos/'

    async function init(){
      const c = await fetch('./config.json')
      config = await c.json()
      await loadData()
      render()
    }

    async function loadData(){
      const res = await fetch(raw + config.repo + '/' + config.branch + '/data.json')
      data = await res.json()
    }

    async function saveData(){
      const token = '' // 这里不用填，我下一步教你
      const res = await fetch(api + config.repo + '/contents/data.json', {
        headers: {Authorization: 'token ' + token}
      })
      const d = await res.json()
      await fetch(api + config.repo + '/contents/data.json', {
        method: 'PUT',
        headers: {Authorization: 'token ' + token},
        body: JSON.stringify({
          message: '更新数据',
          content: btoa(unescape(encodeURIComponent(JSON.stringify(data)))),
          sha: d.sha
        })
      })
      await loadData()
      render()
    }

    function go(p){page=p;render()}
const token = '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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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'
    function render(){
      let a = ''
      if(page=='players'){
        a+=`<div class="section"><div class="section-title">添加选手</div>
        <input id="pname" placeholder="选手名">
        <input id="pnum" placeholder="车号">
        <input id="pteam" placeholder="车队">
        <div class="btn" onclick="addPlayer()">保存选手</div></div>`
        data.players.forEach(p=>{
          a+=`<div class="item">${p.number} ${p.name} | ${p.team}</div>`
        })
      }
      if(page=='matches'){
        a+=`<div class="section"><div class="section-title">添加赛事</div>
        <input id="mname" placeholder="赛事名称">
        <div class="btn" onclick="addMatch()">保存赛事</div></div>`
        data.matches.forEach(m=>{
          a+=`<div class="item">${m.name}</div>`
        })
      }
      if(page=='scores'){
        a+=`<div class="section"><div class="section-title">录入成绩</div>
        <select id="sp">${data.players.map(p=>`<option value="${p.name}">${p.name}</option>`)}</select>
        <select id="sm">${data.matches.map(m=>`<option value="${m.name}">${m.name}</option>`)}</select>
        <input id="ss" placeholder="成绩(秒)">
        <div class="btn" onclick="addScore()">保存成绩</div></div>`
      }
      if(page=='rank'){
        const rank = {}
        data.scores.forEach(s=>{rank[s.player]=(rank[s.player]||0)+Number(s.score)})
        Object.entries(rank).sort((a,b)=>a[1]-b[1]).forEach(([n,s],i)=>{
          a+=`<div class="item">第${i+1}名 ${n} | 总分 ${s}</div>`
        })
      }
      document.getElementById('app').innerHTML = a
    }

    function addPlayer(){
      data.players.push({name:document.getElementById('pname').value,number:document.getElementById('pnum').value,team:document.getElementById('pteam').value})
      saveData()
    }

    function addMatch(){
      data.matches.push({name:document.getElementById('mname').value})
      saveData()
    }

    function addScore(){
      data.scores.push({player:document.getElementById('sp').value,match:document.getElementById('sm').value,score:document.getElementById('ss').value})
      saveData()
    }

    init()
  </script>
</body>
</html>
