<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ECRC 拉力冠军赛</title>
<style>
/* ========== Reset & Base ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
  background:#0a0e27;color:#e6f1ff;font-size:14px;
  -webkit-text-size-adjust:100%;
  overflow-x:hidden;
}
#app{
  min-height:100vh;padding-bottom:70px;
  max-width:480px;margin:0 auto;
}
.page{display:none;padding:12px 16px}
.page.active{display:block}

/* ========== Typography ========== */
.section-title{
  font-size:18px;font-weight:700;color:#00d4ff;margin-bottom:14px;
  display:flex;align-items:center;
}
.section-title::before{
  content:'';display:inline-block;width:4px;height:20px;
  background:linear-gradient(#00d4ff,#7b2ff7);border-radius:2px;margin-right:10px;
}

/* ========== Cards ========== */
.card{
  background:linear-gradient(135deg,#111845,#1a2155);
  border-radius:10px;padding:14px;margin-bottom:12px;
  border:1px solid rgba(0,212,255,.12);
  box-shadow:0 2px 12px rgba(0,0,0,.35);
  cursor:pointer;
}
.card:active{opacity:.9;transform:scale(.98)}
.tag{
  display:inline-block;padding:2px 10px;border-radius:5px;
  font-size:11px;font-weight:500;margin-right:6px;
}
.tag-surface-asphalt{background:rgba(120,140,160,.3);color:#a0b8d0}
.tag-surface-gravel{background:rgba(180,140,80,.25);color:#d4b870}
.tag-surface-snow{background:rgba(160,210,240,.25);color:#b0d8f8}
.tag-surface-mixed{background:rgba(140,120,200,.25);color:#c0b0e8}

/* ========== Buttons ========== */
.btn-primary{
  background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;
  border:none;border-radius:8px;padding:10px 28px;font-size:15px;
  font-weight:600;cursor:pointer;
}
.btn-outline{
  background:transparent;color:#00d4ff;border:2px solid #00d4ff;
  border-radius:8px;padding:8px 24px;font-size:14px;cursor:pointer;
}
.btn-danger{
  background:rgba(255,60,80,.15);color:#ff3c50;border:2px solid #ff3c50;
  border-radius:8px;padding:6px 18px;font-size:12px;cursor:pointer;
}

/* ========== Tab Bar ========== */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:#0d1230;border-top:1px solid rgba(0,212,255,.12);
  display:flex;z-index:100;height:60px;
}
.tab-bar .tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:#8892b0;font-size:11px;
  cursor:pointer;transition:all .2s;
}
.tab-bar .tab .tab-icon{font-size:22px;margin-bottom:2px}
.tab-bar .tab.active{color:#00d4ff;font-weight:600}

/* ========== Toast ========== */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.85);color:#fff;padding:12px 24px;
  border-radius:8px;font-size:14px;z-index:9999;
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1}

/* ========== Modal ========== */
.modal-mask{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-content{
  background:#111845;border-radius:16px 16px 0 0;
  padding:24px 16px;width:100%;max-width:480px;
  max-height:75vh;overflow-y:auto;
}
.modal-title{font-size:18px;font-weight:700;color:#e6f1ff;margin-bottom:4px}
.modal-meta{font-size:13px;color:#8892b0;margin-bottom:20px}
.modal-buttons{display:flex;gap:12px;margin-top:20px}
.modal-buttons button{flex:1}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;color:#8892b0;margin-bottom:8px}
.form-input,.picker-box{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:12px 14px;font-size:15px;color:#e6f1ff;
}
select.form-input{appearance:none}
.time-input-row{display:flex;align-items:center;gap:8px}
.time-input-row input{
  flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;text-align:center;font-size:18px;color:#00d4ff;
  font-weight:700;font-family:monospace;padding:12px 0;max-width:70px;
}
.time-colon{font-size:20px;color:#8892b0;font-weight:700}
.time-ms{max-width:90px!important}

/* ========== Home Page ========== */
.logo-wrap{text-align:center;padding:30px 0 16px}
.logo-wrap img{width:200px;max-width:70%}
.subtitle{font-size:12px;color:#8892b0;letter-spacing:3px;margin-top:8px}
.quick-actions{display:flex;justify-content:center;gap:16px;margin:14px 0 28px}
.quick-actions button{
  display:flex;align-items:center;gap:6px;padding:10px 22px;
  background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);
  border-radius:24px;color:#00d4ff;font-size:13px;font-weight:600;cursor:pointer;
}
.quick-actions button .q-icon{font-size:20px}
.rally-card{display:flex;align-items:center}
.rally-num{
  width:46px;height:46px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);
  border-radius:10px;color:#fff;font-size:18px;font-weight:900;font-style:italic;
  display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0
}
.rally-info{flex:1;min-width:0}
.rally-name{font-size:16px;font-weight:700;color:#e6f1ff;margin-bottom:4px}
.rally-meta{display:flex;flex-wrap:wrap;gap:4px}
.rally-count{text-align:right;flex-shrink:0}
.rally-count .num{display:block;font-size:24px;font-weight:900;color:#00d4ff}
.rally-count .unit{font-size:11px;color:#8892b0}

/* ========== Rally Page ========== */
.rally-hero{
  display:flex;align-items:center;padding:18px;
  background:linear-gradient(135deg,#111845,#1e2560);
  border-radius:12px;margin-bottom:18px;
  border:1px solid rgba(0,212,255,.18);
}
.hero-num{width:54px;height:54px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);
  border-radius:12px;color:#fff;font-size:22px;font-weight:900;font-style:italic;
  display:flex;align-items:center;justify-content:center;margin-right:14px;flex-shrink:0
}
.hero-info{flex:1}
.hero-name{font-size:19px;font-weight:800;color:#e6f1ff;margin-bottom:6px}
.hero-meta{display:flex;flex-wrap:wrap;gap:6px}

.stage-card{display:flex;align-items:center}
.stage-num{
  width:36px;height:36px;background:rgba(0,212,255,.15);
  border-radius:8px;color:#00d4ff;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0
}
.stage-info{flex:1;min-width:0}
.stage-name{font-size:15px;font-weight:600;color:#e6f1ff;margin-bottom:4px}
.stage-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.stage-length{font-size:12px;color:#8892b0}
.stage-best{
  display:flex;align-items:center;gap:8px;padding:4px 10px;
  background:rgba(0,212,255,.06);border-radius:6px;font-size:12px
}
.best-label{color:#ffd700;font-weight:700;font-size:11px}
.best-player{color:#e6f1ff}
.best-time{color:#00d4ff;font-weight:700;font-family:monospace}
.stage-no-result{font-size:12px;color:#4a5568}

/* ========== Players ========== */
.add-header{
  display:flex;justify-content:space-between;align-items:center;
  font-size:15px;font-weight:600;color:#00d4ff;cursor:pointer
}
.add-form{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)}
.avatar-section{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.avatar-preview{
  width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.08);
  overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.avatar-preview img{width:100%;height:100%;object-fit:cover}
.avatar-placeholder{font-size:20px;color:#8892b0;font-weight:700}

.player-card{display:flex;align-items:center}
.player-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#00d4ff,#7b2ff7);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  margin-right:12px;flex-shrink:0
}
.player-avatar img{width:100%;height:100%;object-fit:cover}
.player-av-text{font-size:20px;font-weight:800;color:#fff}
.player-main{flex:1;min-width:0}
.player-pname{font-size:16px;font-weight:700;color:#e6f1ff}
.player-stats{display:flex;gap:10px;font-size:11px;margin-top:2px}
.player-stats span{color:#8892b0;background:rgba(255,255,255,.05);padding:1px 8px;border-radius:4px}
.player-stats .best-stat{color:#ffd700;background:rgba(255,215,0,.08)}

.empty-state{text-align:center;padding:60px 0}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;color:#8892b0;margin-bottom:6px}
.empty-hint{font-size:12px;color:#4a5568}

.tab-bar-rank{display:flex;background:rgba(255,255,255,.04);border-radius:8px;padding:4px;margin-bottom:16px}
.tab-bar-rank .rtab{
  flex:1;text-align:center;padding:10px;font-size:14px;color:#8892b0;
  border-radius:6px;cursor:pointer
}
.rtab.active{background:rgba(0,212,255,.15);color:#00d4ff;font-weight:700}
.rank-card{display:flex;align-items:center}
.rank-badge{width:36px;font-size:22px;font-weight:700;text-align:center;flex-shrink:0;color:#8892b0}
.rank-1{color:#ffd700!important}
.rank-2{color:#c0c0c0!important}
.rank-3{color:#cd7f32!important}
.rank-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#00d4ff,#7b2ff7);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  margin:0 10px;flex-shrink:0

.rank-avatar img{width:100%;height:100%;object-fit:cover}
.rank-av-text{font-size:18px;font-weight:800;color:#fff}
.rank-info{flex:1;min-width:0}
.rank-pname{font-size:15px;font-weight:700;color:#e6f1ff}
.rank-sub{font-size:11px;color:#8892b0}
.rank-score{font-size:22px;font-weight:900;color:#ffd700;flex-shrink:0}
.rank-picker{margin-bottom:14px}
.rank-picker select{width:100%}

.stage-results-mini{margin-top:6px}
.mini-row{display:flex;align-items:center;gap:8px;padding:2px 0;font-size:11px}
.mini-name{color:#8892b0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-time{color:#00d4ff;font-weight:600;font-family:monospace;width:80px}
.mini-pts{color:#7b2ff7;font-weight:600;width:40px;text-align:right}

.footer{text-align:center;padding:20px 0;font-size:11px;color:#3a4560}
</style>
</head>

// ========== STORAGE ==========
function S(k,v){if(v===undefined){try{return JSON.parse(localStorage.getItem('ecrc_'+k))}catch(e){return null}}localStorage.setItem('ecrc_'+k,JSON.stringify(v))}
function init(){
  S('rallies',DEFAULT_RALLIES);
  if(!S('players')) S('players',[]);
  if(!S('results')) S('results',[]);
}
init();

// ========== HELPERS ==========
function surfaceClass(s){
  if(!s)return'mixed';
  if(s==='冰雪')return'snow';
  if(s.includes('冰雪')&&!s.includes('柏油'))return'snow';
  if(s==='柏油')return'asphalt';
  if(s==='砂石')return'gravel';
  if(s==='砂石/柏油'||s==='砂石/泥地')return'gravel';
  if(s==='柏油/冰雪'||s==='柏油/砂石')return'mixed';
  return'mixed';
}
function fmtTime(ms){
  var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),mi=ms%1000;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(mi).padStart(3,'0');
}
function toast(msg){
  var e=document.getElementById('toast');
  e.textContent=msg;e.classList.add('show');
  setTimeout(function(){e.classList.remove('show')},1500);
}
function showModal(html){
  var d=document.createElement('div');d.className='modal-mask';
  d.innerHTML='<div class="modal-content">'+html+'</div>';
  d.addEventListener('click',function(ev){if(ev.target===d)d.remove()});
  document.body.appendChild(d);
  return d;
}

// ========== ROUTER ==========
var currentPage='',currentRallyId=null;
function nav(page,data){
  currentPage=page;currentRallyId=data?data.rallyId:null;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  var p=document.getElementById('page-'+page);if(p)p.classList.add('active');
  document.querySelectorAll('.tab-bar .tab').forEach(function(t){t.classList.remove('active')});
  var tab=document.querySelector('.tab-bar .tab[data-page="'+(page==='rally'?'home':page)+'"]');
  if(tab)tab.classList.add('active');
  if(page==='rally')renderRally(data.rallyId);
  if(page==='home')renderHome();
  if(page==='players')renderPlayers();
  if(page==='ranking')renderRanking();
}
function surfaceTag(s){
  if(!s)return'mixed';
  if(s.includes('冰雪')&&!s.includes('柏油'))return'snow';
  if(s==='柏油')return'asphalt';
  if(s.includes('砂石')&&!s.includes('柏油'))return'gravel';
  return'mixed';
}

// ========== RALLY ==========
function renderRally(rallyId){
  var rally=S('rallies').find(function(r){return r.id===rallyId})||{};
  var stages=STAGE_DATA.filter(function(s){return s.rallyId===rallyId});
  var results=S('results')||[];
  var html='<div class="page active" id="page-rally">';
  html+='<div class="rally-hero"><div class="hero-num">R'+rallyId+'</div><div class="hero-info"><div class="hero-name">'+rally.name+'</div><div class="hero-meta"><span class="tag">'+rally.country+'</span><span class="tag tag-surface-'+surfaceClass(rally.surface)+'">'+rally.surface+'</span><span class="tag">'+stages.length+' 赛段</span></div></div></div>';
  html+='<div class="section-title">赛段列表</div>';
  stages.forEach(function(st,idx){
    var stageResults=results.filter(function(r){return r.rallyId===rallyId&&r.stageName===st.name}).sort(function(a,b){return a.timeMs-b.timeMs});
    var best=stageResults[0];
    html+='<div class="card" onclick="openScoreModal('+rallyId+','+idx+')">';
    html+='<div class="stage-card"><div class="stage-num">'+(idx+1)+'</div><div class="stage-info"><div class="stage-name">'+st.name+'</div><div class="stage-meta"><span class="stage-length">'+st.lengthKm+' km</span><span class="tag tag-surface-'+surfaceTag(st.surface)+'">'+st.surface+'</span></div>';
    if(best){
      html+='<div class="stage-best"><span class="best-label">最佳</span><span class="best-player">'+best.playerName+'</span><span class="best-time">'+best.timeStr+'</span></div>';
    }else{
      html+='<div class="stage-no-result">暂无成绩</div>';
    }
    html+='</div></div></div>';
  });
  html+='</div>';
  document.getElementById('app').innerHTML=html;
}

// ========== SCORE MODAL ==========
function openScoreModal(rallyId,stageIdx){
  var rally=S('rallies').find(function(r){return r.id===rallyId})||{};
  var stages=STAGE_DATA.filter(function(s){return s.rallyId===rallyId});
  var stage=stages[stageIdx];
  var players=S('players')||[];
  var results=S('results')||[];
  var stageResults=results.filter(function(r){return r.rallyId===rallyId&&r.stageName===stage.name}).sort(function(a,b){return a.timeMs-b.timeMs});

  var playerOpts=players.length===0?'<option value="">请先添加选手</option>':players.map(function(p,i){return'<option value="'+i+'">'+p.name+'</option>'}).join('');

  var existingHtml='';
  if(stageResults.length>0){
    existingHtml='<div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)"><div style="font-size:14px;font-weight:600;color:#ffd700;margin-bottom:8px">已有成绩</div>';
    stageResults.forEach(function(r,i){
      existingHtml+='<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:12px;font-weight:700;width:36px;color:#8892b0">#'+(i+1)+'</span><span style="flex:1;font-size:14px;color:#e6f1ff">'+r.playerName+'</span><span style="font-size:14px;font-weight:700;color:#00d4ff;font-family:monospace">'+r.timeStr+'</span></div>';
    });
    existingHtml+='</div>';
  }

  var html='<div class="modal-title">录入成绩 - '+stage.name+'</div>';
  html+='<div class="modal-meta">'+stage.lengthKm+' km · '+stage.surface+'</div>';
  html+='<div class="form-group"><div class="form-label">选择选手</div><select class="form-input" id="score-player">'+playerOpts+'</select></div>';
  html+='<div class="form-group"><div class="form-label">成绩 (分:秒.毫秒)</div><div class="time-input-row"><input id="score-min" placeholder="03" maxlength="2" type="number"><span class="time-colon">:</span><input id="score-sec" placeholder="45" maxlength="2" type="number"><span class="time-colon">.</span><input id="score-ms" placeholder="200" maxlength="3" type="number" style="max-width:90px!important"></div></div>';
  html+='<div class="modal-buttons"><button class="btn-outline" onclick="this.closest(\'.modal-mask\').remove()">取消</button><button class="btn-primary" onclick="submitScore('+rallyId+','+stageIdx+')">确认提交</button></div>';
  html+=existingHtml;

  showModal(html);
}

function submitScore(rallyId,stageIdx){
  var players=S('players')||[];
  var pIdx=parseInt(document.getElementById('score-player').value);
  if(isNaN(pIdx)||!players[pIdx]){toast('请选择选手');return}
  var player=players[pIdx];
  var minVal=document.getElementById('score-min').value;
  var secVal=document.getElementById('score-sec').value;
  var msVal=document.getElementById('score-ms').value||'0';
  if(!minVal||!secVal){toast('请输入完整成绩');return}
  var m=parseInt(minVal),s=parseInt(secVal),ms=parseInt(msVal);
  if(s>=60){toast('秒数不能超过59');return}
  var totalMs=m*60000+s*1000+ms;
  var rally=S('rallies').find(function(r){return r.id===rallyId})||{};
  var stages=STAGE_DATA.filter(function(s){return s.rallyId===rallyId});
  var stage=stages[stageIdx];
  var results=S('results')||[];
  results.push({
    id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    rallyId:rallyId,rallyName:rally.name,stageName:stage.name,
    playerId:player.id,playerName:player.name,timeMs:totalMs,
    timeStr:fmtTime(totalMs),date:new Date().toLocaleDateString('zh-CN')
  });
  S('results',results);
  document.querySelector('.modal-mask').remove();
  renderRally(rallyId);
  toast('成绩录入成功');
}

// ========== PLAYERS ==========
function renderPlayers(){
  var players=S('players')||[];
  var results=S('results')||[];
  players=players.map(function(p){
    var prs=results.filter(function(r){return r.playerId===p.id}).sort(function(a,b){return a.timeMs-b.timeMs});
    return{p:p,totalRaces:prs.length,bestTime:prs[0]?prs[0].timeStr:null};
  });
  var html='<div class="page active" id="page-players">';
  html+='<div class="section-title">参赛选手 ('+players.length+'人)</div>';
  html+='<div class="card"><div class="add-header" onclick="toggleAddForm()"><span>＋ 添加选手</span><span id="add-arrow">▼</span></div>';
  html+='<div class="add-form" id="add-form" style="display:none">';
  html+='<input class="form-input" id="new-player-name" placeholder="输入选手名称/ID" maxlength="20" style="margin-bottom:12px">';
  html+='<div class="avatar-section"><div class="avatar-preview" id="avatar-preview"><span class="avatar-placeholder">?</span></div><button class="btn-outline" onclick="document.getElementById(\'avatar-file\').click()" style="font-size:12px;padding:6px 14px">选择头像</button><input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="previewAvatar(event)"></div>';
  html+='<button class="btn-primary" onclick="addPlayer()">确认添加</button></div></div>';
  if(players.length===0){
    html+='<div class="empty-state"><div class="empty-icon">🏎️</div><div class="empty-text">还没有添加选手</div><div class="empty-hint">点击上方添加第一位参赛选手</div></div>';
  }else{
    players.forEach(function(item){
      var p=item.p;
      html+='<div class="card"><div class="player-card">';
      html+='<div class="player-avatar">';
      if(p.avatar)html+='<img src="'+p.avatar+'" alt="">';
      else html+='<span class="player-av-text">'+p.name[0]+'</span>';
      html+='</div>';
      html+='<div class="player-main"><div class="player-pname">'+p.name+'</div><div class="player-stats"><span>'+item.totalRaces+' 场比赛</span>';
      if(item.bestTime)html+='<span class="best-stat">最佳 '+item.bestTime+'</span>';
      html+='</div></div>';
      html+='<button class="btn-danger" onclick="deletePlayer(\''+p.id+'\')">删除</button>';
      html+='</div></div>';
    });
  }
  html+='</div>';
  document.getElementById('app').innerHTML=html;
}

function toggleAddForm(){
  var f=document.getElementById('add-form');
  var a=document.getElementById('add-arrow');
  if(f){f.style.display=f.style.display==='none'?'block':'none';a.textContent=f.style.display==='none'?'▼':'▲'}
}
var _newAvatar='';
function previewAvatar(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){_newAvatar=ev.target.result;
    var p=document.getElementById('avatar-preview');
    p.innerHTML='<img src="'+ev.target.result+'" style="width:100%;height:100%;object-fit:cover">';
  };
  reader.readAsDataURL(file);
}
function addPlayer(){
  var name=document.getElementById('new-player-name').value.trim();
  if(!name){toast('请输入选手名称');return}
  var players=S('players')||[];
  players.push({id:'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name:name,avatar:_newAvatar||''});
  S('players',players);
  _newAvatar='';
  renderPlayers();
  toast('添加成功');
}
function deletePlayer(id){
  if(!confirm('确认删除该选手？将同时清除其所有成绩记录。'))return;
  var players=S('players')||[];players=players.filter(function(p){return p.id!==id});
  var results=S('results')||[];results=results.filter(function(r){return r.playerId!==id});
  S('players',players);S('results',results);
  renderPlayers();
  toast('已删除');
}

// ========== RANKING ==========
var rankTab=0,rankRallyIdx=0;
function renderRanking(){
  var players=S('players')||[];
  var results=S('results')||[];
  var rallies=S('rallies')||[];

  // total rank
  var totalHtml='';
  if(results.length===0){
    totalHtml='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">暂无比赛数据</div></div>';
  }else{
    var scoreMap={};
    players.forEach(function(p){
      scoreMap[p.id]={playerId:p.id,playerName:p.name,avatar:p.avatar||'',totalStages:0,points:0};
    });
    // group by rally+stage
    var groups={};
    results.forEach(function(r){
      var k=r.rallyId+'_'+r.stageName;
      if(!groups[k])groups[k]=[];
      groups[k].push(r);
    });
    Object.values(groups).forEach(function(g){
      g.sort(function(a,b){return a.timeMs-b.timeMs}).forEach(function(r,i){
        var pts=POINT_TABLE[i]||0;
        if(scoreMap[r.playerId]){scoreMap[r.playerId].points+=pts;scoreMap[r.playerId].totalStages+=1}
      });
    });
    var totalRank=Object.values(scoreMap).filter(function(p){return p.totalStages>0}).sort(function(a,b){return b.points-a.points||b.totalStages-a.totalStages});
    totalRank.forEach(function(p,i){
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      var rc=i<3?' rank-'+ (i+1):'';
      totalHtml+='<div class="card"><div class="rank-card"><div class="rank-badge'+rc+'">'+medal+'</div><div class="rank-avatar">';
      if(p.avatar)totalHtml+='<img src="'+p.avatar+'">';
      else totalHtml+='<span class="rank-av-text">'+(p.playerName||'?')[0]+'</span>';
      totalHtml+='</div><div class="rank-info"><div class="rank-pname">'+p.playerName+'</div><div class="rank-sub">'+p.totalStages+' 赛段</div></div><div class="rank-score">'+p.points+' 分</div></div></div>';
    });
  }

  // rally rank
  var rallyOpts=rallies.map(function(r){return'<option value="'+r.id+'">'+r.name+'</option>'}).join('');
  var rallyRankHtml='';
  if(rankRallyIdx>=0&&rallies[rankRallyIdx]){
    var rally=rallies[rankRallyIdx];
    var rResults=results.filter(function(r){return r.rallyId===rally.id});
    if(rResults.length===0){
      rallyRankHtml='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">该分站暂无成绩数据</div></div>';
    }else{
      var rGroups={};
      rResults.forEach(function(r){
        if(!rGroups[r.stageName])rGroups[r.stageName]=[];
        rGroups[r.stageName].push(r);
      });
      var rPlayerMap={};
      Object.entries(rGroups).forEach(function(_ref){
        var sn=_ref[0],srs=_ref[1];
        srs.sort(function(a,b){return a.timeMs-b.timeMs}).forEach(function(r,i){
          if(!rPlayerMap[r.playerId]){
            var pl=players.find(function(p){return p.id===r.playerId});
            rPlayerMap[r.playerId]={playerId:r.playerId,playerName:r.playerName,avatar:(pl?pl.avatar:'')||r.playerAvatar||'',points:0,totalTimeMs:0,stageCount:0,bestTime:null,bestMs:Infinity,stages:[]};
          }
          var pts=POINT_TABLE[i]||0;
          rPlayerMap[r.playerId].points+=pts;
          rPlayerMap[r.playerId].totalTimeMs+=r.timeMs;
          rPlayerMap[r.playerId].stageCount+=1;
          if(r.timeMs<rPlayerMap[r.playerId].bestMs){rPlayerMap[r.playerId].bestMs=r.timeMs;rPlayerMap[r.playerId].bestTime=r.timeStr}
          rPlayerMap[r.playerId].stages.push({stageName:sn,timeStr:r.timeStr,points:pts});
        });
      });
      var rRank=Object.values(rPlayerMap).sort(function(a,b){return b.points-a.points});
      rRank.forEach(function(p,i){
        var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        var rc=i<3?' rank-'+(i+1):'';
        rallyRankHtml+='<div class="card"><div class="rank-card"><div class="rank-badge'+rc+'">'+medal+'</div><div class="rank-avatar">';
        if(p.avatar)rallyRankHtml+='<img src="'+p.avatar+'">';
        else rallyRankHtml+='<span class="rank-av-text">'+(p.playerName||'?')[0]+'</span>';
        rallyRankHtml+='</div><div class="rank-info"><div class="rank-pname">'+p.playerName+'</div><div class="rank-sub">最佳 '+p.bestTime+' · '+p.stageCount+' 赛段</div><div class="stage-results-mini">';
        p.stages.forEach(function(s){
          rallyRankHtml+='<div class="mini-row"><span class="mini-name">'+s.stageName+'</span><span class="mini-time">'+s.timeStr+'</span><span class="mini-pts">'+s.points+'分</span></div>';
        });
        rallyRankHtml+='</div></div><div class="rank-score" style="font-size:16px">'+fmtTime(p.totalTimeMs)+'</div></div></div>';
      });
    }
  }

  var html='<div class="page active" id="page-ranking">';
  html+='<div class="tab-bar-rank"><div class="rtab'+(rankTab===0?' active':'')+'" onclick="switchRankTab(0)">总排名</div><div class="rtab'+(rankTab===1?' active':'')+'" onclick="switchRankTab(1)">按分站</div></div>';
  if(rankTab===0){
    html+='<div class="section-title">车手总积分榜</div>'+totalHtml;
  }else{
    html+='<div class="rank-picker"><select class="form-input" onchange="switchRallyRank(this.value)">'+rallies.map(function(r,i){return'<option value="'+i+'"'+(i===rankRallyIdx?' selected':'')+'>'+r.name+'</option>'}).join('')+'</select></div>';
    html+='<div class="section-title">'+rallies[rankRallyIdx].name+' 排名</div>'+rallyRankHtml;
  }
  html+='</div>';
  document.getElementById('app').innerHTML=html;
}
function switchRankTab(t){
  rankTab=t;renderRanking();
}
function switchRallyRank(idx){
  rankRallyIdx=parseInt(idx);renderRanking();
}

// ========== TAB BAR ==========
document.querySelectorAll('.tab-bar .tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    var page=tab.dataset.page;
    nav(page);
  });
});

// ========== INIT ==========
renderHome();
</script>
